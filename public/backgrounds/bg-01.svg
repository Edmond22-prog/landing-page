<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="70%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <radialGradient id="g2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#1a0a35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#g2)"/>
  <!-- Grid lines -->
  <g stroke="#7b5ef8" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="320" y1="0" x2="320" y2="1080"/>
    <line x1="640" y1="0" x2="640" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1280" y1="0" x2="1280" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
  </g>
  <!-- Glowing orb -->
  <circle cx="1400" cy="300" r="300" fill="#7b5ef8" fill-opacity="0.06"/>
  <circle cx="1400" cy="300" r="150" fill="#7b5ef8" fill-opacity="0.05"/>
  <circle cx="300" cy="800" r="200" fill="#4c3baf" fill-opacity="0.05"/>
</svg>
