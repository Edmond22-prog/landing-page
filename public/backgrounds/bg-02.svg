  <!-- Subtle diagonal lines -->
  <g stroke="#5b3dd8" stroke-opacity="0.06" stroke-width="1">
    <line x1="-100" y1="600" x2="1200" y2="-100"/>
    <line x1="200" y1="1200" x2="1600" y2="-200"/>
