<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="30%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#0d1535"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#1c0a45" stop-opacity="0.9"/>
