  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#g2)"/>
  <!-- Bokeh dots -->
  <circle cx="1600" cy="150" r="60" fill="#9d7eff" fill-opacity="0.06"/>
  <circle cx="1750" cy="350" r="30" fill="#7b5ef8" fill-opacity="0.08"/>
  <circle cx="1500" cy="500" r="80" fill="#4c3baf" fill-opacity="0.05"/>
