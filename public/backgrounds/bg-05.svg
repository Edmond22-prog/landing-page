<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="40%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4c2fa0" stop-opacity="0.25"/>
      <stop offset="50%"  stop-color="#7b5ef8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1a0a40" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2d1b8a" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6030d0" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Bandes aurora ondulées -->
  <ellipse cx="960" cy="300"  rx="1100" ry="180" fill="url(#aurora1)"/>
  <ellipse cx="800" cy="550"  rx="900"  ry="120" fill="url(#aurora2)"/>
  <ellipse cx="1100" cy="780" rx="850"  ry="100" fill="url(#aurora1)" opacity="0.6"/>

  <!-- Lignes horizontales fines (scan lines style) -->
  <g stroke="#7b5ef8" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="150"  x2="1920" y2="180"/>
    <line x1="0" y1="300"  x2="1920" y2="320"/>
    <line x1="0" y1="480"  x2="1920" y2="460"/>
    <line x1="0" y1="640"  x2="1920" y2="660"/>
    <line x1="0" y1="820"  x2="1920" y2="800"/>
    <line x1="0" y1="960"  x2="1920" y2="980"/>
  </g>

  <!-- Poussières lumineuses (tiny glows) -->
  <g fill="#c4b5fd">
    <circle cx="300"  cy="200"  r="1.5" fill-opacity="0.5"/>
    <circle cx="720"  cy="130"  r="1"   fill-opacity="0.4"/>
    <circle cx="1150" cy="90"   r="1.5" fill-opacity="0.5"/>
    <circle cx="1500" cy="210"  r="1"   fill-opacity="0.3"/>
    <circle cx="1780" cy="160"  r="1.5" fill-opacity="0.4"/>
    <circle cx="180"  cy="620"  r="1"   fill-opacity="0.3"/>
    <circle cx="550"  cy="870"  r="1.5" fill-opacity="0.4"/>
    <circle cx="1300" cy="950"  r="1"   fill-opacity="0.3"/>
    <circle cx="1650" cy="700"  r="1.5" fill-opacity="0.4"/>
    <circle cx="980"  cy="420"  r="2"   fill-opacity="0.3"/>
  </g>

  <!-- Accent coin bas-gauche -->
  <ellipse cx="0" cy="1080" rx="400" ry="250" fill="#5b2dd8" fill-opacity="0.06"/>
  <!-- Accent coin haut-droit -->
  <ellipse cx="1920" cy="0" rx="350" ry="220" fill="#7b5ef8" fill-opacity="0.07"/>
</svg>
