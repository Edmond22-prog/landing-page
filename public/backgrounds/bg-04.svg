<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="60%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0b0b22"/>
      <stop offset="100%" stop-color="#04040c"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b5ef8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Réseau de points connectés (style tech/IA) -->
  <g stroke="#7b5ef8" stroke-opacity="0.12" stroke-width="1" fill="none">
    <!-- Lignes de connexion -->
    <line x1="960" y1="540" x2="1200" y2="300"/>
    <line x1="960" y1="540" x2="750"  y2="280"/>
    <line x1="960" y1="540" x2="1350" y2="620"/>
    <line x1="960" y1="540" x2="600"  y2="700"/>
    <line x1="960" y1="540" x2="1100" y2="820"/>
    <line x1="1200" y1="300" x2="1450" y2="200"/>
    <line x1="1200" y1="300" x2="1350" y2="620"/>
    <line x1="750"  y1="280" x2="500"  y2="150"/>
    <line x1="750"  y1="280" x2="600"  y2="700"/>
    <line x1="1450" y1="200" x2="1700" y2="350"/>
    <line x1="500"  y1="150" x2="250"  y2="300"/>
    <line x1="600"  y1="700" x2="350"  y2="850"/>
    <line x1="1350" y1="620" x2="1600" y2="800"/>
    <line x1="1100" y1="820" x2="1350" y2="620"/>
    <line x1="1100" y1="820" x2="900"  y2="950"/>
  </g>

  <!-- Noeuds du réseau -->
  <g fill="#9d7eff" fill-opacity="0.35">
    <circle cx="960"  cy="540" r="4"/>
    <circle cx="1200" cy="300" r="3"/>
    <circle cx="750"  cy="280" r="3"/>
    <circle cx="1350" cy="620" r="3"/>
    <circle cx="600"  cy="700" r="2.5"/>
    <circle cx="1100" cy="820" r="2.5"/>
    <circle cx="1450" cy="200" r="2"/>
    <circle cx="500"  cy="150" r="2"/>
    <circle cx="1700" cy="350" r="2"/>
    <circle cx="250"  cy="300" r="2"/>
    <circle cx="350"  cy="850" r="2"/>
    <circle cx="1600" cy="800" r="2"/>
    <circle cx="900"  cy="950" r="2"/>
  </g>

  <!-- Halo central -->
  <circle cx="960" cy="540" r="320" fill="url(#glow1)"/>

  <!-- Petits accents lumineux -->
  <circle cx="1200" cy="300" r="40" fill="#7b5ef8" fill-opacity="0.06"/>
  <circle cx="600"  cy="700" r="30" fill="#9d7eff" fill-opacity="0.06"/>
</svg>
